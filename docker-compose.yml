

services:
  backend:
    build: ./backend
    container_name: backendLDO
    ports:
      - "5055:5055"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    networks:
      - my_network
    depends_on:
      postgresLDO:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-your_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-your_password}
      POSTGRES_DB: ${POSTGRES_DB:-your_database}
      POSTGRES_HOST: postgresLDO
      POSTGRES_PORT: 5433

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webLDO
    ports:
      - "5009:3000"
    volumes:
      - type: bind
        source: ./frontend/src/
        target: /app/src/
    networks:
      - my_network
    environment:
      - REACT_APP_LISTEN_ADDRESS=http://192.168.1.159:5055
  postgresLDO:
    image: postgres:latest
    container_name: postgresLDO
    command: ["postgres", "-p", "5433"]
    ports:
      - "5433:5433"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./my_data:/var/lib/postgresql
    networks:
      - my_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5433 -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s


volumes:
  postgres-data:

networks:
  my_network:
    driver: bridge
